<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra AI Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;color:white;overflow:hidden;}
.gradient-bg{position:fixed;width:100%;height:100%;background:linear-gradient(-45deg,#00f5ff,#7b2ff7,#00ffcc,#2c5364);background-size:400% 400%;animation:gradientMove 12s ease infinite;opacity:0.15;z-index:-2;}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#particles-js{position:fixed;width:100%;height:100%;z-index:-1;}
.container{height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.glass-card{width:700px;max-height:90vh;overflow-y:auto;background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);border-radius:20px;padding:35px;box-shadow:0 0 40px rgba(0,255,255,0.4);}
.glass-card h2{text-align:center;margin-bottom:20px;background:linear-gradient(45deg,#00f5ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tabs{display:flex;justify-content:space-between;margin-bottom:20px;}
.tab-btn{flex:1;margin:0 5px;padding:8px;border:none;border-radius:20px;cursor:pointer;background:linear-gradient(45deg,#00f5ff,#7b2ff7);color:white;}
.tab-btn:hover{box-shadow:0 0 15px cyan;}
input, textarea, select{width:100%;padding:8px;margin:5px 0;border:none;border-radius:8px;}
button.action{padding:6px 15px;border:none;border-radius:15px;cursor:pointer;margin:5px 5px 5px 0;}
.add-btn{background:#00cc99;color:white;}
.edit-btn{background:#ffaa00;color:white;}
.delete-btn{background:#ff4d4d;color:white;}
.question-box{background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;margin-top:10px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;}
.modal-content{background:rgba(255,255,255,0.1);padding:25px;border-radius:15px;width:450px;box-shadow:0 0 30px cyan;}
.modal-content h3{text-align:center;margin-bottom:10px;}
.modal-content button{width:100%;margin-top:10px;}
.logout{text-align:center;margin-top:15px;cursor:pointer;opacity:0.7;}
.logout:hover{opacity:1;}
</style>
</head>
<body>

<div class="gradient-bg"></div>
<div id="particles-js"></div>

<div class="container">
<div class="glass-card">
<h2>🤖 Ultra AI Admin Panel</h2>

<div class="tabs">
  <button class="tab-btn" onclick="showTab('reading')">Reading</button>
  <button class="tab-btn" onclick="showTab('verbal')">Verbal</button>
  <button class="tab-btn" onclick="showTab('interview')">Interview</button>
</div>

<!-- Reading Section -->
<div id="reading">
<textarea id="readingQ" placeholder="Enter Reading Question"></textarea>
<button class="action add-btn" onclick="addReading()">Add</button>
<div id="readingList"></div>
</div>

<!-- Verbal Section -->
<div id="verbal" style="display:none;">
<input id="vQ" placeholder="Question">
<input id="o1" placeholder="Option1">
<input id="o2" placeholder="Option2">
<input id="o3" placeholder="Option3">
<input id="o4" placeholder="Option4">
<select id="correct">
<option>Option1</option>
<option>Option2</option>
<option>Option3</option>
<option>Option4</option>
</select>
<button class="action add-btn" onclick="addVerbal()">Add</button>
<div id="verbalList"></div>
</div>

<!-- Interview Section -->
<div id="interview" style="display:none;">
<textarea id="interviewQ" placeholder="Enter Interview Question"></textarea>
<button class="action add-btn" onclick="addInterview()">Add</button>
<div id="interviewList"></div>
</div>

<div class="logout" onclick="logout()">Logout</div>
</div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Edit Question</h3>
    <div id="modalReading" style="display:none;">
      <textarea id="editReadingText"></textarea>
    </div>
    <div id="modalVerbal" style="display:none;">
      <input id="editVQ" placeholder="Question">
      <input id="editO1" placeholder="Option1">
      <input id="editO2" placeholder="Option2">
      <input id="editO3" placeholder="Option3">
      <input id="editO4" placeholder="Option4">
      <select id="editCorrect">
        <option>Option1</option>
        <option>Option2</option>
        <option>Option3</option>
        <option>Option4</option>
      </select>
    </div>
    <div id="modalInterview" style="display:none;">
      <textarea id="editInterviewText"></textarea>
    </div>
    <button class="action add-btn" onclick="updateQuestion()">Update</button>
    <button class="action delete-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
if(sessionStorage.getItem("adminAuth")!=="true"){location.href="index.html";}
const supabaseClient = supabase.createClient(
"https://rmmgttfsqtgafkfmjztl.supabase.co",
"sb_publishable_men_Rj_NvpjM_ZQeZc_kIA_pFS6VIcg"
);

let currentTable="", currentId="", currentType="";

function showTab(tab){
  document.getElementById("reading").style.display="none";
  document.getElementById("verbal").style.display="none";
  document.getElementById("interview").style.display="none";
  document.getElementById(tab).style.display="block";
  loadQuestions(tab);
}

async function loadQuestions(type){
  const {data}=await supabaseClient.from(type+"_questions").select("*");
  let list=document.getElementById(type+"List");
  list.innerHTML="";
  data.forEach(q=>{
    list.innerHTML+=`
      <div class="question-box">
        ${q.question}
        <br>
        <button class="action edit-btn" onclick="openModal('${type}_questions','${q.id}','${type}','${encodeURIComponent(JSON.stringify(q))}')">Edit</button>
        <button class="action delete-btn" onclick="deleteQuestion('${type}_questions','${q.id}')">Delete</button>
      </div>`;
  });
}

/* Add */
async function addReading(){await supabaseClient.from("reading_questions").insert({question:readingQ.value}); readingQ.value=""; loadQuestions("reading");}
async function addVerbal(){await supabaseClient.from("verbal_questions").insert({
  question:vQ.value, option1:o1.value, option2:o2.value, option3:o3.value, option4:o4.value, correct_option:correct.value
}); vQ.value=o1.value=o2.value=o3.value=o4.value=""; loadQuestions("verbal");}
async function addInterview(){await supabaseClient.from("interview_questions").insert({question:interviewQ.value}); interviewQ.value=""; loadQuestions("interview");}

/* Open Modal */
function openModal(table,id,type,qStr){
  currentTable=table; currentId=id; currentType=type;
  document.getElementById("modalReading").style.display="none";
  document.getElementById("modalVerbal").style.display="none";
  document.getElementById("modalInterview").style.display="none";
  const qObj=JSON.parse(decodeURIComponent(qStr));
  if(type=="reading"){document.getElementById("modalReading").style.display="block"; document.getElementById("editReadingText").value=qObj.question;}
  else if(type=="verbal"){
    document.getElementById("modalVerbal").style.display="block";
    document.getElementById("editVQ").value=qObj.question;
    document.getElementById("editO1").value=qObj.option1;
    document.getElementById("editO2").value=qObj.option2;
    document.getElementById("editO3").value=qObj.option3;
    document.getElementById("editO4").value=qObj.option4;
    document.getElementById("editCorrect").value=qObj.correct_option;
  }
  else if(type=="interview"){document.getElementById("modalInterview").style.display="block"; document.getElementById("editInterviewText").value=qObj.question;}
  document.getElementById("editModal").style.display="flex";
}
function closeModal(){document.getElementById("editModal").style.display="none";}

/* Update */
async function updateQuestion(){
  if(currentType=="reading"){await supabaseClient.from(currentTable).update({question:document.getElementById("editReadingText").value}).eq("id",currentId);}
  else if(currentType=="verbal"){await supabaseClient.from(currentTable).update({
    question:document.getElementById("editVQ").value,
    option1:document.getElementById("editO1").value,
    option2:document.getElementById("editO2").value,
    option3:document.getElementById("editO3").value,
    option4:document.getElementById("editO4").value,
    correct_option:document.getElementById("editCorrect").value
  }).eq("id",currentId);}
  else if(currentType=="interview"){await supabaseClient.from(currentTable).update({question:document.getElementById("editInterviewText").value}).eq("id",currentId);}
  closeModal();
  showTab(currentType);
}

/* Delete */
async function deleteQuestion(table,id){await supabaseClient.from(table).delete().eq("id",id); showTab(table.replace("_questions",""));}
function logout(){sessionStorage.removeItem("adminAuth"); location.href="index.html";}

showTab("reading");

/* Particles */
particlesJS("particles-js", {particles:{number:{value:80}, size:{value:3}, move:{speed:2}, line_linked:{enable:true}}});
</script>

</body>
</html>
