<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
min-height:100vh;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);

#particles-js{position:fixed;width:100%;height:100%;z-index:-1;}
.container{height:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{
width:900px;
max-width:95%;
min-height:85vh;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border-radius:30px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 60px rgba(0,255,255,0.2),0 0 100px rgba(0,0,0,0.6);
padding:35px;

flex-direction:column;
justify-content:space-between;

.title{text-align:center;font-size:32px;font-weight:800;background:linear-gradient(45deg,#00f5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.timer{font-size:14px;opacity:.85;}
.progressbar{flex:1;height:12px;margin-left:20px;background:rgba(255,255,255,0.1);border-radius:50px;overflow:hidden;position:relative;}
.progress{height:100%;width:0%;background:linear-gradient(90deg,#00f5ff,#7b2ff7);border-radius:50px;transition:0.4s;}
.question-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;opacity:0;transform:translateY(20px);transition:all 0.6s ease;}
.question-area.show{opacity:1;transform:translateY(0);}
.question{font-size:24px;font-weight:700;margin-bottom:20px;line-height:1.5;}
input,textarea{width:100%;padding:14px;border:none;border-radius:15px;margin-top:12px;background:rgba(255,255,255,0.12);color:white;font-size:16px;outline:none;transition:0.3s;}
input:focus,textarea:focus{background:rgba(255,255,255,0.2);}
.options{margin-top:15px;text-align:left;width:100%;max-width:500px;}
.options label{display:block;padding:14px;margin:8px 0;background:rgba(255,255,255,0.08);border-radius:15px;cursor:pointer;transition:0.3s;position:relative;}
.options label:hover{background:rgba(0,255,255,0.15);transform:scale(1.03);}
button{padding:12px 26px;border:none;border-radius:15px;font-weight:700;cursor:pointer;margin:6px;transition:.3s;}
button:hover{transform:scale(1.05);}
.next{background:linear-gradient(45deg,#00f5ff,#00cc99);color:black;box-shadow:0 0 15px #00f5ff;}
.prev{background:linear-gradient(45deg,#ffaa00,#ff6600);color:black;box-shadow:0 0 15px #ffaa00;}
.submit{background:linear-gradient(45deg,#ff3d3d,#ff0066);color:white;box-shadow:0 0 15px #ff3d3d;}
.mic{background:linear-gradient(45deg,#00f5ff,#a855f7);color:black;font-size:16px;box-shadow:0 0 15px #00f5ff;}
.nav{
display:flex;
justify-content:space-between;
margin-top:20px;
flex-wrap:wrap;
gap:10px;
}
.wave{
width:100%;
max-width:500px;
height:150px;
margin-top:20px;
background:rgba(255,255,255,0.08);
border-radius:20px;
box-shadow:0 0 20px #00f5ff inset;
}
.result-dashboard{display:flex;gap:30px;justify-content:center;margin-top:25px;flex-wrap:wrap;}
canvas{width:260px !important;height:260px !important;background:rgba(255,255,255,0.08);border-radius:15px;padding:12px;}
.feedback{margin-top:10px;font-size:14px;color:#00ffcc;font-weight:600;}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(45deg,#00f5ff,#a855f7);display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:30px;animation:float 2s infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@media(max-width:600px){.card{padding:20px;height:auto;}}

border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 60px rgba(0,255,255,0.2),0 0 100px rgba(0,0,0,0.6);

<body>
<div id="particles-js"></div>
<div class="container">
<div class="card">
<div>
<div class="title">🤖 Ultra AI Communication Assessment V2</div>
<div class="topbar">
<div class="timer" id="timer">00:30</div>
<div class="progressbar"><div class="progress" id="progress"></div></div>
</div>
</div>

<div class="question-area" id="content"></div>

<div class="nav">
<button class="prev" onclick="prev()">Previous</button>
<button class="next" onclick="next()">Next</button>
<button class="home" onclick="returnHome()">Return Home</button>
</div>
<div class="footer-text">
VoxMentor AI - Advanced Communication Practice Platform<br>
DEVELOPED BY - T. TamilSelvan, B.Sc Computer Science [SF], KASC, Batch : 2023 - 2026
</div>
</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://rmmgttfsqtgafkfmjztl.supabase.co",
  "sb_publishable_men_Rj_NvpjM_ZQeZc_kIA_pFS6VIcg"
);
particlesJS("particles-js",{particles:{number:{value:100},size:{value:3},move:{speed:2},line_linked:{enable:true}}})

let step=0,totalSteps=1,timeLeft=30,timerInterval;

let micPermissionGranted=false;
let audioStream=null;
let reading=[],verbal=[],interview=[];
let answers={reading:[],verbal:[],interview:[],scores:[],feedback:[],candidate:{}};

// Load Questions
async function loadQuestions(){
  const r=await supabaseClient.from("reading_questions").select("*")
  const v=await supabaseClient.from("verbal_questions").select("*")
  const i=await supabaseClient.from("interview_questions").select("*")
  reading=r.data; verbal=v.data; interview=i.data;
  totalSteps=1+reading.length+verbal.length+interview.length+1;
  render();
}

// Timer
function startTimer(){
  clearInterval(timerInterval);
  timeLeft = 30;

  timerInterval = setInterval(()=>{
    timeLeft--;

    document.getElementById("timer").innerText =
      "00:" + String(timeLeft).padStart(2,'0');

    if(timeLeft<=0){
      clearInterval(timerInterval);
      next();
    }

  },1000);
}
function updateProgress(){document.getElementById("progress").style.width=((step/totalSteps)*100)+"%";}

// Save candidate info
function saveCandidateInfo(){
  if(step===0){
    answers.candidate.name = document.getElementById("name").value || "N/A";
    answers.candidate.roll = document.getElementById("roll").value || "N/A";
    answers.candidate.dept = document.getElementById("dept").value || "N/A";
  }
}

// Render
function render(){
  updateProgress(); 
  const content=document.getElementById("content");
  content.classList.remove("show"); setTimeout(()=>{content.classList.add("show");},50);
  content.innerHTML="";
  
  if(step===0){
    content.innerHTML=`<h2>Candidate Information</h2>
    <input id="name" placeholder="Full Name">
    <input id="roll" placeholder="Roll Number">
    <input id="dept" placeholder="Department">`;
  } else if(step<=reading.length){
    let q=reading[step-1];
    content.innerHTML=`<div class="avatar">🤖</div><div class="question">${q.question}</div>
    <button class="mic" onclick="voiceReading()">🎤 Start Speaking</button>

<div style="width:100%;display:flex;justify-content:center;">
<canvas id="wave" class="wave"></canvas>
</div>

<div id="voiceText" style="margin-top:10px"></div>
    <div class="feedback" id="feedback"></div>`;
    visualizeWave();
  } else if(step<=reading.length+verbal.length){
    let index=step-reading.length-1,q=verbal[index];
    content.innerHTML=`<div class="avatar">🤖</div><div class="question">${q.question}</div>
    <div class="options">
    <label><input type="radio" name="v" value="${q.option1}"> ${q.option1}</label>
    <label><input type="radio" name="v" value="${q.option2}"> ${q.option2}</label>
    <label><input type="radio" name="v" value="${q.option3}"> ${q.option3}</label>
    <label><input type="radio" name="v" value="${q.option4}"> ${q.option4}</label>
    </div>
    <div class="feedback" id="feedback"></div>`;
  } else if(step<=reading.length+verbal.length+interview.length){
    let index=step-reading.length-verbal.length-1,q=interview[index];
    content.innerHTML=`<div class="avatar">🤖</div><div class="question">${q.question}</div>
    <button class="mic" onclick="voiceInterview()">🎤 Start Speaking</button>

<div style="display:flex;justify-content:center;width:100%">
<canvas id="wave" class="wave"></canvas>
</div>

<div id="voiceText" style="margin-top:10px"></div>
    <div class="feedback" id="feedback"></div>`;
    visualizeWave();
  } else {
    content.innerHTML=`<h2>Assessment Result</h2>
    <div class="result-dashboard"><canvas id="pie"></canvas><canvas id="radar"></canvas></div>
    <button class="submit" onclick="downloadPDF()">Download Report</button>`;
    renderCharts();
  }
}

// Navigation
function next(){

  clearInterval(timerInterval);

  if(step===0) saveCandidateInfo();

  simulateScore();

  step++;

  render();

}
function prev(){if(step>0){step--;render();}}

// Voice capture
async function voiceReading(){

  await requestMicPermission();   // ask permission only first time

  startTimer();   // timer starts after clicking start speaking
  visualizeWave();

  const recognition =
  new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = function(e){

    let text = e.results[0][0].transcript;

    document.getElementById("voiceText").innerText =
    "You Said: " + text;

    answers.reading[step-1] = text;

  }

}
async function voiceInterview(){

  await requestMicPermission();   // ask mic permission once

  startTimer();
  visualizeWave();

  const recognition =
  new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-US";

  recognition.start();

  recognition.onresult = function(e){

    let text = e.results[0][0].transcript;

    document.getElementById("voiceText").innerText =
    "You Said: " + text;

    let index = step - reading.length - verbal.length - 1;

    answers.interview[index] = text;

  }

}
// Audio wave
function visualizeWave(){

if(!audioStream) return;

const canvas=document.getElementById("wave");
const ctx=canvas.getContext("2d");

const audioCtx=new AudioContext();
const analyser=audioCtx.createAnalyser();

const source=audioCtx.createMediaStreamSource(audioStream);

source.connect(analyser);

analyser.fftSize=256;

const bufferLength=analyser.frequencyBinCount;

const dataArray=new Uint8Array(bufferLength);

function draw(){

requestAnimationFrame(draw);

analyser.getByteFrequencyData(dataArray);

ctx.clearRect(0,0,canvas.width,canvas.height);

let barWidth=canvas.width/bufferLength;

for(let i=0;i<bufferLength;i++){

let barHeight=dataArray[i]/2;

ctx.fillStyle=`rgb(${barHeight+100},50,255)`;

ctx.fillRect(i*barWidth,canvas.height-barHeight,barWidth,barHeight);

}

}

draw();

}

// Simulated scoring
function simulateScore(){if(step===0) return;let score=Math.floor(Math.random()*10)+1;let feedbacks=["Excellent","Good","Average","Needs Improvement","Outstanding"];let feedback=feedbacks[Math.floor(Math.random()*feedbacks.length)];answers.scores[step-1]=score;answers.feedback[step-1]=feedback;let fbEl=document.getElementById("feedback");if(fbEl) fbEl.innerText=`Score: ${score}/10 | Feedback: ${feedback}`;}

// Charts
function renderCharts(){
  let r=answers.reading.length,v=answers.verbal.length,i=answers.interview.length;
  new Chart(document.getElementById("pie"),{type:"pie",data:{labels:["Reading","Verbal","Interview"],datasets:[{data:[r,v,i],backgroundColor:["#00f5ff","#7b2ff7","#00ffcc"]}]}});
  let radarScores=[0,0,0,0,0];for(let s of answers.scores) radarScores[Math.floor(Math.random()*5)]+=s;
  new Chart(document.getElementById("radar"),{type:"radar",data:{labels:["Fluency","Vocabulary","Confidence","Clarity","Logic"],datasets:[{data:radarScores,backgroundColor:"rgba(0,255,255,0.3)",borderColor:"#00f5ff"}]}});
}

// PDF
function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation:"landscape",unit:"pt",format:"a4"});
    const pageWidth = doc.internal.pageSize.getWidth();
    let y=50;

    // Title
    doc.setFontSize(22); doc.setTextColor(0,102,204);
    doc.text("AI Communication Assessment Report", pageWidth/2, y,{align:"center"});

    y+=40;

    // Candidate Info
    const name=answers.candidate?.name||"N/A";
    const roll=answers.candidate?.roll||"N/A";
    const dept=answers.candidate?.dept||"N/A";
    doc.setFontSize(14); doc.setTextColor(50,50,50);
    doc.text(`Name: ${name}`,40,y);
    doc.text(`Roll Number: ${roll}`,250,y);
    doc.text(`Department: ${dept}`,460,y);

    y+=30;

    // Table header
    doc.setFontSize(14); doc.setTextColor(0,0,0); doc.setFillColor(200,200,255);
    doc.rect(40,y,pageWidth-80,25,"F");
    doc.setTextColor(0,0,50);
    doc.text("Q#",60,y+17); doc.text("Answer Type",100,y+17); doc.text("Score",220,y+17); doc.text("Feedback",300,y+17);

    y+=25;

    // Table rows
    doc.setFontSize(12);
    const types=["Reading","Verbal","Interview"];
    answers.scores.forEach((s,i)=>{
        const typeIndex = i < reading.length ? 0 : i < reading.length + verbal.length ? 1 : 2;
        const answerType = types[typeIndex];
        const feedback = answers.feedback[i] || "";
        doc.text(`${i+1}`,60,y+15); doc.text(answerType,100,y+15); doc.text(`${s}/10`,220,y+15); doc.text(feedback,300,y+15);
        y+=20;
        if(y>doc.internal.pageSize.getHeight()-50){doc.addPage();y=50;}
    });

    // Pie chart medium
    const pieCanvas=document.getElementById("pie");
    if(pieCanvas){
        const pieImg=pieCanvas.toDataURL("image/png",1.0);
        doc.addPage(); doc.setFontSize(16); doc.setTextColor(0,0,102);
        doc.text("Category Summary",pageWidth/2,40,{align:"center"});
        const pieWidth=300,pieHeight=300;
        const pieX=(pageWidth-pieWidth)/2,pieY=60;
        doc.addImage(pieImg,'PNG',pieX,pieY,pieWidth,pieHeight);
    }
    // Developer Footer
doc.setFontSize(10);

doc.text(
"VoxMentor AI - Advanced Communication Practice Platform",
20,
doc.internal.pageSize.getHeight()-20
);

doc.text(
"DEVELOPED BY - T. TamilSelvan, B.Sc Computer Science [SF], KASC, Batch : 2023 - 2026",
20,
doc.internal.pageSize.getHeight()-12
);

    doc.save("assessment_report.pdf");
}

loadQuestions();
async function requestMicPermission(){

  if(micPermissionGranted) return;

  try{

    audioStream = await navigator.mediaDevices.getUserMedia({audio:true});

    micPermissionGranted = true;

  }catch(err){

    alert("Microphone permission is required to continue.");

  }

}
function returnHome(){

if(confirm("Are you sure you want to return to the home page?")){
    
    clearInterval(timerInterval);

    window.location.href="index.html";

}

}
</script>
